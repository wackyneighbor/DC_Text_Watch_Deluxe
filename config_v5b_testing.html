.collapsible-header::after {
  content: ' ▶';
  font-size: 0.75em;
  opacity: 0.5;
  transition: transform 0.25s ease;
  display: inline-block;
}
.collapsible:not(.collapsed) .collapsible-header::after {
  content: ' ▼';
  opacity: 0.8;
}
.item-container.collapsible {
  margin-top: 0;
  border-top: 1px solid rgba(0, 0, 0, 1);
}
.collapsible.collapsed {
  margin-top: 0;
}
.gps-subsection {
  margin-left: 16px;
  padding-left: 10px;
  border-left: 2px solid rgba(255,255,255,0.12);

  overflow: hidden;

  max-height: 200px; /* enough for content */
  opacity: 1;

  transition:
    max-height 0.25s ease,
    opacity 0.2s ease,
    padding 0.25s ease,
    margin 0.25s ease;
}
/* collapsed state */
.gps-disabled {
  opacity: 0.35;

  max-height: 0;
  padding-top: 0;
  padding-bottom: 0;
  margin-top: 0;

  pointer-events: none;
  border-left: 2px solid rgba(255,255,255,0.08);
}
.collapsible-header {
  cursor: pointer;
  user-select: none;
}

.collapsible-body {
  overflow: hidden;
  max-height: 2000px;
  opacity: 1;

  transition:
    max-height 0.35s ease,
    opacity 0.2s ease;
}
/* collapsed state */
.collapsible.collapsed .collapsible-body {
  max-height: 0;
  opacity: 0;
}
button.item-button {
  height: auto;
  padding: 6px 10px;
}
.item small, .button-container small {
  line-height: 1.2;
  display: block;
  margin-bottom: 0;
  padding-bottom: 0;
}

  <script>
  function getHexStrColorWith0x(in_str) {
    /*
    ** Returns hex string WITH a leading 0x
    */
    if (in_str.startsWith('0x'))
    {
        return in_str;
    }
    else
    {
        return '0x' + in_str;
    }
  }

  function getHexStrColorWithOut0x(in_str) {
    /*
    ** Returns hex string withOUT a leading 0x
    */
    if (in_str.startsWith('0x'))
    {
        return in_str.substr(2, 6);
    }
    else
    {
        return in_str;
    }
  }

 function getBoolValue(in_value) {
    var result=false;

    switch (in_value) {
        case true:
        case 'true':
        case 'True':
        case 'TRUE':
        case 1:
        case '1':
        case 'on':
            result = true;
            break;
        default:
            result = false;
            break;
    }
    return result;
  }

 function sendBoolValue(in_value) {
    var result='0';

    switch (in_value) {
        case true:
            result = '1';
            break;
        default:
            result = '0';
            break;
    }
    return result;
  }

 function getQueryParam(variable, defaultValue) {
    var query = location.search.substring(1);
    var vars = query.split('&');
    for (var i = 0; i < vars.length; i++) {
      var pair = vars[i].split('=');
      if (pair[0] === variable) {
        return decodeURIComponent(pair[1]);
      }
    }
    return defaultValue || false;
  }

function updateGPSSectionState() {
  console.log("updateGPSSectionState fired");

  // TRUE = analog elements are enabled
  var analogEnabled =
    document.getElementById('AnalogElementscheckbox').checked;

  var gpsSection =
    document.getElementById('gps_section');

  var gpsCheckbox =
    document.getElementById('NoGPScheckbox');

  // GPS should be disabled when analog is OFF
  var gpsDisabled = !analogEnabled;

  // Visual dimming + interaction lock
  gpsSection.classList.toggle('gps-disabled', gpsDisabled);

  // Disable actual input
  gpsCheckbox.disabled = gpsDisabled;
}

function setupCollapsibleSections() {
  var headers = document.querySelectorAll('.collapsible-header');

  headers.forEach(function(header) {
    header.addEventListener('click', function() {
      var container = header.closest('.collapsible');

      var wasOpen = !container.classList.contains('collapsed');

      // close all
      document.querySelectorAll('.collapsible')
        .forEach(el => el.classList.add('collapsed'));

      // toggle behavior:
      // if it WAS closed → open it
      // if it WAS open → leave all closed
      if (!wasOpen) {
        container.classList.remove('collapsed');
      }
    });
  });
}
